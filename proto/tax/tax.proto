syntax = "proto3";
option go_package = "github.com/touchvas/proto-registry/gen/go/tax";
package protobuf;
import "common/common.proto";
// The Odds service definition.
service Tax {
  // Sends GetOdds status request
  rpc TaxOnSportsStake(Stake) returns (TaxResponse) {}
  rpc TaxOnCasinoStake(Stake) returns (TaxResponse) {}
  rpc TaxOnSportsWinning(Winning) returns (TaxResponse) {}
  rpc TaxOnCasinoWinning(Winning) returns (TaxResponse) {}
  rpc TaxOnDeposit(Transaction) returns (TaxResponse) {}
  rpc TaxOnWithdrawal(Transaction) returns (TaxResponse) {}
  rpc Ping (TaxPing) returns (TaxPong) {}

}

message TaxPing {

}

message TaxPong {
  int64 Status = 1;
  string Data = 2;
}

message Stake {
  int64 betId = 1;
  float StakeAmt = 2;
  float odds = 3;
}

message Winning {
  int64 betId = 1;
  float StakeAmt = 2;
  float odds = 3;
  float Winnings = 4;
}

message TaxResponse {
  float TaxCharged = 1;
}

message Transaction {
  float Amount = 1;
}