syntax = "proto3";
option go_package = "github.com/touchvas/proto-registry/gen/go/payment-provider";
package protobuf;

// --------------------------------------------------------------------------
// SERVICE DEFINITION
// --------------------------------------------------------------------------

// The PaymentGateway service provides a set of RPC methods for processing
// deposits and withdrawals. It acts as an intermediary between the application
// and various payment service providers.
service PaymentProvider {

  // Health Check
  // Used to check the health and liveness of the Payment Gateway service.
  rpc PaymentProviderPing (PaymentProviderPingPayload) returns (PaymentProviderPingResponse) {}

  // ------------------------------------------------------------------------
  // DEPOSIT METHODS
  // ------------------------------------------------------------------------
  // These methods handle the flow of funds from a customer's account
  // into the system.

  // DepositRequest
  // Initiates a deposit request from a customer. This is also known as an
  // "STK Push Request" for mobile money providers.
  rpc DepositRequest (DepositRequestPayload) returns (DepositRequestResponse) {}

  // DepositStatusCheck
  // Used by the payment gateway to query the status of a deposit request
  // with the payment provider. This can be used for reconciliation or to
  // check for missing transaction callbacks.
  rpc DepositStatusCheck (DepositStatusCheckPayload) returns (DepositStatusCheckResponse) {}

  // ------------------------------------------------------------------------
  // WITHDRAWAL & SEND MONEY METHODS
  // ------------------------------------------------------------------------
  // These methods handle the flow of funds from the system to a customer's
  // account.

  // SendMoney
  // Used by the payment gateway to send a request to a payment service
  // provider to send funds directly to a customer's account.
  rpc SendMoney (SendMoneyPayload) returns (SendMoneyResponse) {}

  // ------------------------------------------------------------------------
  // COMMENTED OUT METHODS
  // ------------------------------------------------------------------------
  // NOTE: This method is currently commented out. Uncomment it if needed.
  // Method used by payment provider services to update the status of a withdrawal request
  // rpc WithdrawRequestCallback (WithdrawRequestCallbackPayload) returns (GeneralResponsePayload) {}
}

// --------------------------------------------------------------------------
// MESSAGE DEFINITIONS
// --------------------------------------------------------------------------

// A generic response payload for acknowledging requests.
message GeneralResponsePayload {
  // A status code (e.g., 200 for success, 400 for bad request).
  int64 Status = 1;
  // A human-readable description of the status.
  string Description = 2;
}

// Health Check Messages
message PaymentProviderPingPayload {}
message PaymentProviderPingResponse {
  int64 Status = 1;
  string Data = 2;
}

// Deposit Messages
message DepositRequestPayload {
  // The destination account identifier. This can be a phone number
  // (for mobile money) or a bank account number.
  string AccountNumber = 1;

  // The account type identifier, such as a mobile money provider code
  // or a bank code.
  string AccountIdentifier = 2;

  // The amount of money to request.
  float Amount = 3;

  // A unique transaction identifier generated by the payment gateway.
  int64 TransactionID = 4;

  // An optional description for the request.
  string Description = 5;

  // A field for providers that require custom, non-standard data.
  string Others = 6;
  //used by banks
  int64 Code =7;
}

message DepositRequestResponse {
  // A status code indicating whether the request was successfully processed.
  int64 Status = 1;

  // A human-readable description of the status.
  string Description = 2;

  // Optional redirection details if the user needs to be redirected
  // to a URL to complete the deposit.
  Redirect Redirect = 3;
}

message DepositStatusCheckPayload {
  // The unique transaction ID to check. One of these fields must be provided.
  int64 TransactionID = 1;
  // The transaction reference to check.
  string Reference = 2;
}

message DepositStatusCheckResponse {
  // A status indicating the current state of the request. It can also
  // indicate that the system should wait for a callback.
  int64 Status = 1;

  // A description of the status.
  string Description = 2;
}

// Send Money Messages
message SendMoneyPayload {
  // The recipient's account identifier (phone number or bank account).
  string AccountNumber = 1;

  // The account type identifier (e.g., bank code, mobile money code).
  string AccountIdentifier = 2;

  // The amount of money to send.
  float Amount = 3;

  // A unique transaction ID generated by the payment gateway.
  int64 TransactionID = 4;

  // An optional description for the request.
  string Description = 5;

  // A field for providers that require custom data.
  string Others = 6;
  //used by banks
  int64 Code =7;
}

message SendMoneyResponse {
  // A status code indicating whether the request was successfully processed.
  int64 Status = 1;

  // A description of the status.
  string Description = 2;

  // Optional redirection details.
  Redirect Redirect = 3;
}

// Shared Messages
message Redirect {
  // If true, the customer must be redirected to the specified URL.
  bool Enabled = 1;

  // The URL to redirect the customer to to complete the payment.
  string Url = 2;
}