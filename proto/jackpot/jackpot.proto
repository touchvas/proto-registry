syntax = "proto3";
option go_package = "github.com/touchvas/proto-registry/gen/go/jackpot";
package jackpot;
import "common/common.proto";

// The Odds service definition.
service Jackpot {
  // Sends GetOdds status request
  rpc JackpotBetSummary(JPBetSummaryRequest) returns (JPBetSummaryResponse) {}
  rpc PlaceBet(JackpotBetRequest) returns (PlaceBetResponse) {}
  rpc AutoPick(AutoPickRequest) returns (PlaceBetResponse) {}
  rpc AliasPick(AliasPickRequest) returns (PlaceBetResponse) {}
  rpc JpGames(JackpotGamesRequest) returns (JackpotGamesResponse){}
  rpc ServiceRequest(common.ServiceActionRequest) returns (common.GeneralAck) {}

  rpc Ping (JackpotPing) returns (JackpotPong) {}

}

message JackpotPing {
 string lang = 1;
}

message JackpotPong {
  int64 Status = 1;
  string Data = 2;
   string lang = 3;
}

// The request message containing the selection details.
message JPBetSummaryRequest {
  int32 profileID = 1;
   string lang = 2;
}

message JPBetSummaryResponse {
  int32 NumberOfBets = 1;
  float Stake = 2;
  float Winning = 3;
   string lang = 4;
}


message JackpotBetRequest {
  repeated JackpotSlips JackpotSlips = 1;
  int64 ProfileID = 2;
  float stake = 3;
  string source = 4;
  string ipAddress = 5;
  int64 betType = 6;
  string BookingCode = 7;
  int64 JackpotID = 8;
   string lang = 9;

}
message JackpotGamesRequest {
  int64 CategoryID = 1;
   string lang = 2;
}
message JackpotGamesResponse {
  string Games = 1;
   string lang = 2;
}


message JackpotSlips {
  int64  MatchID = 1;
  int64  ProducerID = 2;
  int64  MatchNumber = 3;
  int64  MarketID = 4;
  string  Specifier = 5;
  string  OutcomeID = 6;
   string lang = 7;

}

message PlaceBetResponse {
  int64  status = 1;
  string description = 2;
  string shareCode = 3;
   string lang = 4;
}

message AutoPickRequest {
  int64 ProfileID = 1;
  float stake = 2;
  string ipAddress = 3;
  int64 JackpotID = 4;
   string lang = 5;

}

message AliasPickRequest {
  int64 ProfileID = 1;
  float stake = 2;
  string ipAddress = 3;
  int64 JackpotID = 4;
  string Alias = 5;
   string lang = 6;

}