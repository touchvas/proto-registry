syntax = "proto3";
option go_package = "github.com/touchvas/proto-registry/gen/go/wallet";
package protobuf;
import "common/common.proto";

// The Odds service definition.
service Wallet {
  rpc DebitAccount (DebitRequest) returns (DebitResponse) {}
  rpc CreditAccount (DebitRequest) returns (DebitResponse) {}
  rpc GetBalance (BalanceRequest) returns (BalanceResponse) {}
  rpc STK (STKRequest) returns (STKResponse) {}
  rpc Withdraw (WithdrawRequest) returns (WithdrawResponse) {}
  rpc RequestPaymentCallback (RequestPaymentCallbackRequest) returns (CallbackResponse) {}
  rpc SendPaymentCallback (CallbackRequest) returns (CallbackResponse) {}
  rpc Deposit (DepositRequest) returns (CallbackResponse) {}
  rpc UpdateTransaction (UpdateTransactionRequest) returns (UpdateTransactionResponse) {}
  rpc RollbackTransaction (RollbackRequest) returns (RollbackResponse) {}
  rpc CreditWinningAccount (DebitRequest) returns (DebitResponse) {}
  rpc HasDeposited (HasDepositedRequest) returns (HasDepositedResponse) {}
  rpc Ping (WalletPing) returns (WalletPong) {}

  rpc DebitAccountWithoutDecimals (DebitRequestWithoutDecimals) returns (DebitResponseWithoutDecimals) {}
  rpc CreditAccountWithoutDecimals (DebitRequestWithoutDecimals) returns (DebitResponseWithoutDecimals) {}
  rpc GetBalanceWithoutDecimals (BalanceRequest) returns (BalanceResponseWithoutDecimals) {}
  rpc CreditWinningAccountWithoutDecimals (DebitRequestWithoutDecimals) returns (DebitResponseWithoutDecimals) {}
  rpc RollbackTransactionWithoutDecimals (RollbackRequest) returns (RollbackResponseWithoutDecimals) {}
  rpc GetAlertContacts (EmptyWalletRequest) returns (AlertContactsResponse) {}
  rpc GetWalletSettings (EmptyWalletRequest) returns (WalletSettingsResponse) {}
  rpc GetUserDeposits (GetUserDepositRequest) returns (GetUserDepositResponse){}
  rpc ServiceRequest(common.ServiceActionRequest) returns (common.GeneralAck) {}

}
message GetUserDepositRequest{
  int64 ProfileId=1;
  string startDate=2;
  string endDate=3;
}
message GetUserDepositResponse {
  float totalDeposits =1;
  float TotalRollback=2;
}
// The request message containing the selection details.
message DebitRequest {
  int64 profileID = 1;
  int32 transactionID = 2;
  string transactionType = 3;
  string description = 4;
  float amount = 5;
  int32 ID = 6;
  string service_name = 7;
  string ip_address = 8;
  int64 ReferenceID = 9;
  string lang = 10; // Add lang field

}

message DebitRequestWithoutDecimals {
  int64 profileID = 1;
  int32 transactionID = 2;
  string transactionType = 3;
  string description = 4;
  int64 amount = 5;
  int32 ID = 6;
  string service_name = 7;
  string ip_address = 8;
  int64 ReferenceID = 9;
  string lang = 10; // Add lang field
}

message DebitResponse {
  int32 Status = 1;
  float CurrentBalance = 2;
  float PendingBalance = 3;
  string Description = 4;
  int32 ID = 5;
  int64 TransactionID = 6;
  string lang = 7; // Add lang field
}

message DebitResponseWithoutDecimals {
  int32 Status = 1;
  int64 CurrentBalance = 2;
  int64 PendingBalance = 3;
  string Description = 4;
  int32 ID = 5;
  int64 TransactionID = 6;
  string lang = 7; // Add lang field
}

message BalanceRequest {
  int64 profileID = 1;
  string lang = 2; // Add lang field
}

message BalanceResponse {
  float CurrentBalance = 1;
  float PendingBalance = 2;
  float WithdrawableBalance = 3;
  string lang = 4; // Add lang field
}

message BalanceResponseWithoutDecimals {
  int64 CurrentBalance = 1;
  int64 PendingBalance = 2;
  int64 WithdrawableBalance = 3;
  string lang = 4; // Add lang field
}

message HasDepositedResponse {
  bool status = 1;
  string lang = 2; // Add lang field
}

message HasDepositedRequest {
  int64 profileID = 1;
  int64 amount = 2;
  string lang = 3; // Add lang field
}

message WalletPing {

}

message WalletPong {
  int64 Status = 1;
  string Data = 2;
  string lang = 3; // Add lang field
  string Test = 4;
}

message WithdrawRequest {

  int64 ProfileID = 1;
  int64 Amount = 2;
  string ip_address = 3;
  string service_name = 4;
  string lang = 5; // Add lang field
  string Reference =6;
  bool USSDRequest = 7;
}

message STKRequest {

  int64 ProfileID = 1;
  int64 Amount = 2;
  string Account = 3;
  string Channel = 4;
  string lang = 5; // Add lang field
}

message WithdrawResponse {

  int64 Status = 1;
  string Description = 2;
  string lang = 3; // Add lang field
  int64 TransactionID = 4;

}

message STKResponse {

  int64 Status = 1;
  string Description = 2;
  string lang = 3; // Add lang field
  string Url =4;
}


message CallbackRequest {
  int64 TransactionID = 1;
  string FirstName = 2;
  string MiddleName = 3;
  string LastName = 4;
  string Msisdn = 5;
  string Account = 6;
  string Reference = 7;
  int64 Amount = 8;
  int64 Status = 9;
  string Channel = 10;
  string IPAddress = 11;
  string Description = 12;
  string lang = 13; // Add lang field
}

message RequestPaymentCallbackRequest {
  int64 TransactionID = 1;
  int64 Status = 2;
  string Description = 3;
  string lang = 4; // Add lang field
}

message CallbackResponse {
  int64 Status = 1;
  string Description = 2;
  string lang = 3; // Add lang field
}

message StatusRequest{
  int64 profileID = 1;
  int32 status = 2;
  string lang = 3; // Add lang field
}

message UpdateTransactionRequest {

  int64 TransactionID = 1;
  int64 ID = 2;
  string Description = 3;
  string lang = 4; // Add lang field

}

message UpdateTransactionResponse {
  int64 Status = 1;
  string Description = 2;
  string lang = 3; // Add lang field
}


message RollbackRequest {
  int64 TransactionID = 1;
  string description = 2;
  string service_name = 3;
  string ip_address = 4;
  string lang = 5; // Add lang field
}

message RollbackResponse {
  int64 Status = 1;
  string Description = 2;
  float CurrentBalance = 3;
  string lang = 4; // Add lang field

}

message RollbackResponseWithoutDecimals {
  int64 Status = 1;
  string Description = 2;
  int64 CurrentBalance = 3;
  string lang = 4; // Add lang field

}

message DepositRequest {
  string FirstName = 1;
  string MiddleName = 2;
  string LastName = 3;
  string Msisdn = 4;
  string Account = 5;
  string Reference = 6;
  int64 Amount = 7;
  string Channel = 8;
  string IPAddress = 9;
  string shortCode = 10;
  int64 walletBalance = 11;
  string lang = 12; // Add lang field
  int64 status = 13;
  string Description =14;
  int64 TransactionCharge =15;
  int64 DeviceID = 16;

}

message EmptyWalletRequest {
  string CountryCode =1;
}

message AlertContactsResponse {
  string Contacts = 1;
}

message WalletSettingsResponse {
  string AlertContacts = 1;
  int64 ProviderBalanceAlert = 2;
  string BlacklistNumbbers = 3;
}