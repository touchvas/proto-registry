syntax = "proto3";
option go_package = "github.com/touchvas/proto-registry/gen/go/notification";
package protobuf;
service Notification{
  rpc SendMessage(SendMessageRequest)returns (sendMessageResponse){}
}
message SendMessageRequest{
  string recipients = 1;
  string template = 2;
  string channel = 3;
  map<string, string> replacements = 4;
  string content = 5;
  int64 OTP =6;
  string countryCode = 7;
  string lang =8;
}
message sendMessageResponse {
  int64 status = 1;
  string description = 2;
}